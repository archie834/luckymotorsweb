name: Update car stock

on:
  schedule:
    - cron: '0 6,12,18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Scrape eBay showroom stock
        run: node scrape-stock.mjs

      - name: Commit changes if stock.json updated
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- stock.json; then
            echo "No stock changes."
          else
            git add stock.json
            git commit -m "Update car stock"
            git push
          fi
